services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        BACKEND_API_URL: ${BACKEND_API_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - '3141:3000'
    env_file:
      - .env

  storybook:
    build:
      context: .
      dockerfile: docker/storybook.Dockerfile
    ports:
      - '3142:80'
